name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install locust

      - name: Start Flask server
        run: |
          python app/app.py &
          sleep 3

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=app --cov=common --cov-report=xml --cov-report=term

      - name: Validate Locust file syntax
        run: |
          locust -f performance/locustfile.py --headless -u 1 -r 1 -t 1s --host http://127.0.0.1:5000 || true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
